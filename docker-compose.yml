services:
  scheduler:
    build: .
    container_name: scheduler
    command: ["sh", "-c", "python -u scripts/run_scheduler_service.py 2>&1 | tee -a /var/log/insider_trading/stdout.log"]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@insider_trading_db:5432/insider_trading
      LOG_DIR: /var/log/insider_trading
    volumes:
      - /data/collector_logs:/var/log/insider_trading
    restart: unless-stopped
    networks:
      - postgres_network

networks:
  postgres_network:
    external: true
    name: postgres_network
