services:
  scheduler:
    build: .
    container_name: scheduler
    command: ["sh", "-c", "python -u scripts/run_scheduler_service.py 2>&1 | tee -a /var/log/mono_db/stdout.log"]
    env_file:
      - /home/pi/secrets/trading_agent.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres_db:5432/mono_db
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      RESEARCH_MODEL_NAME: ${RESEARCH_MODEL_NAME:-gemini-2.5-flash-lite}
      LOG_DIR: /var/log/mono_db
    volumes:
      - /data/mono_db_logs:/var/log/mono_db
    restart: unless-stopped
    networks:
      - postgres_network

  web:
    build: .
    container_name: web
    command: ["sh", "-c", "uvicorn src.app:app --host 0.0.0.0 --port 8000 2>&1 | tee -a /var/log/mono_db/web.log"]
    env_file:
      - /home/pi/secrets/trading_agent.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres_db:5432/mono_db
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      RESEARCH_MODEL_NAME: ${RESEARCH_MODEL_NAME:-gemini-2.5-flash-lite}
      LOG_DIR: /var/log/mono_db
    volumes:
      - /data/mono_db_logs:/var/log/mono_db
    restart: unless-stopped
    networks:
      - postgres_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/entrypoint.sh:/entrypoint.sh:ro
      - nginx_certs:/etc/nginx/certs
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: unless-stopped
    depends_on:
      - web
    networks:
      - postgres_network

volumes:
  nginx_certs:

networks:
  postgres_network:
    external: true
    name: postgres_network
