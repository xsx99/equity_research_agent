name: Teardown Postgres Database

on:
  workflow_dispatch:
    inputs:
      remove_data:
        description: 'Remove database data volume (clean slate)?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  teardown-postgres:
    runs-on: self-hosted
    
    steps:
      - name: Set up Python and virtual environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libxml2-dev libxslt1-dev python3-lxml
          python3 --version
          python3 -m venv .venv --system-site-packages
          source .venv/bin/activate
          python3 -m pip --version
      - name: Stop PostgreSQL
        run: |
          if [ "${{ inputs.remove_data }}" = "true" ]; then
            sudo docker compose -f docker-compose.db.yml down -v
            sudo rm -rf /data/postgres_data
            echo "PostgreSQL stopped and data removed."
          else
            sudo docker compose -f docker-compose.db.yml down
            echo "PostgreSQL stopped. Data preserved."
          fi
