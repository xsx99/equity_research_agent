name: Teardown Local Database

on:
  workflow_dispatch:
    inputs:
      remove_data:
        description: 'Remove database data volume (clean slate)?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  teardown-postgres:
    runs-on: self-hosted
    
    steps:
      - name: Stop PostgreSQL
        run: |
          if [ "${{ inputs.remove_data }}" = "true" ]; then
            docker compose -f docker-compose.db.yml down -v
            echo "PostgreSQL stopped and data removed."
          else
            docker compose -f docker-compose.db.yml down
            echo "PostgreSQL stopped. Data preserved."
          fi
