name: Setup Local Database

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  setup-postgres:
    # Self-hosted Linux runner on Raspberry Pi. Ensure Python 3 and venv are installed.
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python and virtual environment
        run: |
          python3 --version
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip --version

      - name: Start PostgreSQL
        run: |
          sudo docker compose -f docker-compose.db.yml up -d
          echo "Waiting for PostgreSQL to be ready..."
          for _ in {1..30}; do
            if sudo docker exec insider_trading_db pg_isready -U postgres -d insider_trading >/dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL failed to become ready in time"
          sudo docker logs insider_trading_db
          exit 1
          
      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insider_trading
        run: |
          source .venv/bin/activate
          python3 -m pip install -r requirements.txt
          python3 -m alembic upgrade head
          echo "Migrations complete!"
