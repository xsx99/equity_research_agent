name: Setup Postgres Database

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  setup-postgres:
    # Self-hosted Linux runner on Raspberry Pi. Ensure Python 3 and venv are installed.
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python and virtual environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libxml2-dev libxslt1-dev python3-lxml
          python3 --version
          python3 -m venv .venv --system-site-packages
          source .venv/bin/activate
          python3 -m pip --version

      - name: Start PostgreSQL
        run: |
          ENV_FILE=/home/pi/secrets/trading_agent.env
          sudo docker compose --env-file "$ENV_FILE" -f docker-compose.db.yml up -d
          echo "Waiting for PostgreSQL to be ready..."
          for _ in {1..30}; do
            if sudo docker exec postgres_db pg_isready -U postgres -d mono_db >/dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL failed to become ready in time"
          sudo docker logs postgres_db
          exit 1
          
      - name: Run database migrations
        run: |
          set -a
          source /home/pi/secrets/trading_agent.env
          set +a
          export DATABASE_URL="postgresql://postgres:${POSTGRES_PASSWORD}@localhost:5432/mono_db"
          source .venv/bin/activate
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install -r requirements.txt
          python3 -m alembic upgrade head
          echo "Migrations complete!"
