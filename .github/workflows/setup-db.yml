name: Setup Local Database

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  setup-postgres:
    # Self-hosted macOS runner - cannot use actions/setup-python here because
    # self-hosted runners lack the tool cache directories that GitHub-hosted runners have.
    # Instead, we use Homebrew Python directly (must be pre-installed on the runner machine).
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      - name: Start PostgreSQL
        run: |
          docker compose -f docker-compose.db.yml up -d
          echo "Waiting for PostgreSQL to be ready..."
          for _ in {1..30}; do
            if docker exec insider_trading_db pg_isready -U postgres -d insider_trading >/dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL failed to become ready in time"
          docker logs insider_trading_db
          exit 1
          
      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insider_trading
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m alembic upgrade head
          echo "Migrations complete!"
