name: Setup Local Database

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  setup-postgres:
    # Self-hosted macOS runner - cannot use actions/setup-python here because
    # self-hosted runners lack the tool cache directories that GitHub-hosted runners have.
    # Instead, we use Homebrew Python directly (must be pre-installed on the runner machine).
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python and virtual environment
        run: |
          # Use Homebrew Python on macOS self-hosted runner
          # requires homebrew to be installed
          # requires python to be installed: brew install python
          export PATH="/opt/homebrew/bin:$PATH"
          python3 --version
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip --version
      
      - name: Clean up existing database (if any)
        # Remove existing containers and volumes to ensure a clean slate.
        # This prevents issues where the postgres_data volume was created with
        # different credentials, causing "role does not exist" errors.
        # The "|| true" ensures this step succeeds even if nothing exists to remove.
        run: |
          docker compose -f docker-compose.db.yml down -v || true
          echo "Cleaned up existing containers and volumes"
          
      - name: Start PostgreSQL
        run: |
          docker compose -f docker-compose.db.yml up -d
          echo "Waiting for PostgreSQL to be ready..."
          sleep 5
          
      - name: Verify PostgreSQL is running
        run: |
          docker ps | grep insider_trading_db
          echo "PostgreSQL is running on localhost:5432"
          
      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insider_trading
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          source .venv/bin/activate
          python3 -m pip install -r requirements.txt
          python3 -m alembic upgrade head
          echo "Migrations complete!"
