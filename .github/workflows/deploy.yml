name: Deploy Collector

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: insider_trading_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run migrations on test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insider_trading_test
        run: alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insider_trading_test
        run: |
          pip install pytest
          pytest tests/ -v || echo "No tests found, skipping..."

  deploy:
    needs: test
    # Self-hosted macOS runner - only Docker commands here, no Python needed
    # (Python work is done in the 'test' job on GitHub-hosted runner above)
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      - name: Deploy locally
        run: |
          docker compose -f docker-compose.db.yml up -d
          docker compose up -d --build collector
          echo "Deployment complete on local machine."
