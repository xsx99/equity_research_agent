name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: insider_trading_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Python and virtual environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libxml2-dev libxslt1-dev python3-lxml
          python3 --version
          python3 -m venv .venv --system-site-packages
          source .venv/bin/activate
          python3 -m pip --version
      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install -r requirements.txt
      - name: Run migrations on test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insider_trading_test
        run: |
          source .venv/bin/activate
          python3 -m alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insider_trading_test
        run: |
          source .venv/bin/activate
          python3 -m pip install pytest
          python3 -m pytest tests/ -v || echo "No tests found, skipping..."

  deploy:
    needs: test
    # Self-hosted Raspberry Pi runner. Python work is done in the
    # test job on GitHub-hosted runner above.
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      - name: Deploy locally
        run: |
          set -euo pipefail
          ENV_FILE=/home/pi/secrets/trading_agent.env
          POSTGRES_CONTAINER=postgres_db
          POSTGRES_NETWORK=postgres_network
          POSTGRES_DATA_HOST_PATH=/data/postgres_data
          POSTGRES_DATA_CONTAINER_PATH=/var/lib/postgresql/data

          sudo docker network inspect "$POSTGRES_NETWORK" >/dev/null 2>&1 || sudo docker network create "$POSTGRES_NETWORK"

          if sudo docker container inspect "$POSTGRES_CONTAINER" >/dev/null 2>&1; then
            echo "Reusing existing $POSTGRES_CONTAINER container."
            if [ "$(sudo docker inspect -f '{{.State.Running}}' "$POSTGRES_CONTAINER")" != "true" ]; then
              sudo docker start "$POSTGRES_CONTAINER"
            fi
          else
            sudo docker compose --env-file "$ENV_FILE" -f docker-compose.db.yml up -d
          fi

          if ! sudo docker inspect -f '{{range $name, $_ := .NetworkSettings.Networks}}{{println $name}}{{end}}' "$POSTGRES_CONTAINER" | grep -qx "$POSTGRES_NETWORK"; then
            sudo docker network connect "$POSTGRES_NETWORK" "$POSTGRES_CONTAINER"
          fi

          echo "Waiting for PostgreSQL to be ready..."
          for _ in {1..30}; do
            if sudo docker exec "$POSTGRES_CONTAINER" pg_isready -U postgres -d mono_db >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          if ! sudo docker exec "$POSTGRES_CONTAINER" pg_isready -U postgres -d mono_db >/dev/null 2>&1; then
            echo "PostgreSQL failed to become ready in time"
            sudo docker logs "$POSTGRES_CONTAINER" || true
            exit 1
          fi

          DATA_DIR="$(sudo docker exec "$POSTGRES_CONTAINER" psql -U postgres -d mono_db -Atc "SHOW data_directory;")"
          if [ "$DATA_DIR" != "$POSTGRES_DATA_CONTAINER_PATH" ]; then
            echo "Unexpected PostgreSQL data_directory: $DATA_DIR"
            echo "Expected: $POSTGRES_DATA_CONTAINER_PATH"
            exit 1
          fi

          HOST_MOUNT="$(sudo docker inspect -f '{{range .Mounts}}{{if eq .Destination "/var/lib/postgresql/data"}}{{.Source}}{{end}}{{end}}' "$POSTGRES_CONTAINER")"
          if [ "$HOST_MOUNT" != "$POSTGRES_DATA_HOST_PATH" ]; then
            echo "Unexpected PostgreSQL host data mount: ${HOST_MOUNT:-<none>}"
            echo "Expected: $POSTGRES_DATA_HOST_PATH"
            exit 1
          fi

          sudo docker compose --env-file "$ENV_FILE" build --no-cache scheduler web
          sudo docker compose --env-file "$ENV_FILE" up -d --force-recreate scheduler web nginx
          echo "Deployment complete on local machine."
