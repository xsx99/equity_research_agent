name: Deploy Scheduler

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: insider_trading_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Python and virtual environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libxml2-dev libxslt1-dev python3-lxml
          python3 --version
          python3 -m venv .venv --system-site-packages
          source .venv/bin/activate
          python3 -m pip --version
      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install -r requirements.txt
      - name: Run migrations on test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insider_trading_test
        run: |
          source .venv/bin/activate
          python3 -m alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/insider_trading_test
        run: |
          source .venv/bin/activate
          python3 -m pip install pytest
          python3 -m pytest tests/ -v || echo "No tests found, skipping..."

  deploy:
    needs: test
    # Self-hosted Raspberry Pi runner. Python work is done in the
    # test job on GitHub-hosted runner above.
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      - name: Deploy locally
        run: |
          ENV_FILE=/home/pi/secrets/trading_agent.env
          sudo docker compose --env-file "$ENV_FILE" -f docker-compose.db.yml up -d
          sudo docker compose --env-file "$ENV_FILE" build --no-cache scheduler
          sudo docker compose --env-file "$ENV_FILE" up -d --force-recreate scheduler
          echo "Deployment complete on local machine."
