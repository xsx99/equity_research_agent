<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Research App{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <span class="brand">Research App</span>
    <a href="/research" {% if request.url.path.startswith('/research') %}class="active"{% endif %}>Research</a>
    <a href="/watchlist" {% if request.url.path.startswith('/watchlist') %}class="active"{% endif %}>Watchlist</a>
  </nav>

  <div class="container">
    {% for msg in flash %}
    <div class="flash flash-{{ msg.level }}">{{ msg.message }}</div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
