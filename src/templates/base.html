<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Trading Workstation{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_version }}">
</head>
<body>
  <nav>
    <span class="brand">Trading Workstation</span>
    <a href="/today" {% if request.url.path.startswith('/today') %}class="active"{% endif %}>Today</a>
    <a href="/research" {% if request.url.path.startswith('/research') %}class="active"{% endif %}>Research</a>
    <a href="/watchlist" {% if request.url.path.startswith('/watchlist') %}class="active"{% endif %}>Watchlist</a>
  </nav>

  <div class="container">
    {% for msg in flash %}
    <div class="flash flash-{{ msg.level }}">{{ msg.message }}</div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>
  <script>
    (() => {
      const formatterOptions = {
        date: { year: "numeric", month: "2-digit", day: "2-digit" },
        datetime: {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: undefined,
          hour12: false,
          timeZoneName: "short",
        },
        datetime_seconds: {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
          timeZoneName: "short",
        },
        month_day: { month: "2-digit", day: "2-digit" },
      };

      const getFormatter = (formatName) =>
        new Intl.DateTimeFormat(undefined, formatterOptions[formatName] || formatterOptions.datetime);

      const applyLocalTime = () => {
        document.querySelectorAll("time[data-local-time-format]").forEach((node) => {
          const rawValue = node.getAttribute("datetime");
          if (!rawValue) {
            return;
          }

          const parsed = new Date(rawValue);
          if (Number.isNaN(parsed.getTime())) {
            return;
          }

          const formatName = node.dataset.localTimeFormat || "datetime";
          node.textContent = getFormatter(formatName).format(parsed);
          node.title = parsed.toLocaleString(undefined, {
            dateStyle: "full",
            timeStyle: "long",
          });
        });
      };

      const setupExpandableRows = () => {
        document.querySelectorAll(".sig-row").forEach((row) => {
          row.addEventListener("click", (event) => {
            // Don't toggle when the click lands on an interactive child.
            if (event.target.closest("a, button, form, input, select")) {
              return;
            }
            row.classList.toggle("open");
            const detail = row.nextElementSibling;
            if (detail && detail.classList.contains("sig-detail")) {
              detail.classList.toggle("open");
            }
          });
        });
      };

      const setupTabs = () => {
        document.querySelectorAll("[data-tabs]").forEach((container) => {
          const bar = container.querySelector(".tab-bar");
          if (!bar) {
            return;
          }
          bar.querySelectorAll(".tab-btn").forEach((btn) => {
            btn.addEventListener("click", (event) => {
              event.stopPropagation();
              bar.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
              btn.classList.add("active");
              const target = btn.dataset.tab;
              container.querySelectorAll(".tab-panel").forEach((panel) => {
                panel.classList.toggle("active", panel.dataset.panel === target);
              });
            });
          });
        });
      };

      const init = () => {
        applyLocalTime();
        setupExpandableRows();
        setupTabs();
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
